groups:
  - name: lons-platform-alerts
    rules:
      - alert: HighErrorRate
        expr: >
          (
            sum by (job) (rate(http_requests_total{status=~"5.."}[5m]))
            /
            sum by (job) (rate(http_requests_total[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP error rate on {{ $labels.job }}"
          description: "More than 5% of requests are returning 5xx errors on {{ $labels.job }} (current value: {{ $value | humanizePercentage }})."

      - alert: HighLatency
        expr: >
          histogram_quantile(0.99, sum by (le, job) (rate(http_request_duration_seconds_bucket[5m]))) > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High p99 latency on {{ $labels.job }}"
          description: "99th percentile latency exceeds 2 seconds on {{ $labels.job }} (current value: {{ $value | humanizeDuration }})."

      - alert: PodRestarts
        expr: >
          increase(kube_pod_container_status_restarts_total[15m]) > 3
        labels:
          severity: warning
        annotations:
          summary: "Frequent pod restarts for {{ $labels.pod }}"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has restarted more than 3 times in the last 15 minutes."

      - alert: WebhookDeliveryFailures
        expr: >
          (
            sum by (job) (rate(webhook_delivery_failures_total[5m]))
            /
            sum by (job) (rate(webhook_deliveries_total[5m]))
          ) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High webhook delivery failure rate"
          description: "More than 20% of webhook deliveries are failing (current value: {{ $value | humanizePercentage }})."

      - alert: RedisMemoryHigh
        expr: >
          redis_memory_used_bytes / redis_memory_max_bytes > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage above 80%"
          description: "Redis instance {{ $labels.instance }} is using {{ $value | humanizePercentage }} of its max configured memory."
