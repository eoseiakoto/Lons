{{- if .Values.externalSecrets.enabled }}
---
# Database secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "lons.secretName" . }}-database
  labels:
    {{- include "lons.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets-database
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ include "lons.fullname" . }}-aws-sm
    kind: ClusterSecretStore
  target:
    name: {{ include "lons.secretName" . }}-database
    template:
      engineVersion: v2
      data:
        DATABASE_URL: "{{ "{{ .url }}" }}"
  data:
    - secretKey: url
      remoteRef:
        key: lons/{{ .Values.global.environment }}/database
---
# Redis secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "lons.secretName" . }}-redis
  labels:
    {{- include "lons.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets-redis
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ include "lons.fullname" . }}-aws-sm
    kind: ClusterSecretStore
  target:
    name: {{ include "lons.secretName" . }}-redis
    template:
      engineVersion: v2
      data:
        REDIS_URL: "{{ "{{ .url }}" }}"
  data:
    - secretKey: url
      remoteRef:
        key: lons/{{ .Values.global.environment }}/redis
---
# JWT secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "lons.secretName" . }}-jwt
  labels:
    {{- include "lons.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets-jwt
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ include "lons.fullname" . }}-aws-sm
    kind: ClusterSecretStore
  target:
    name: {{ include "lons.secretName" . }}-jwt
    template:
      engineVersion: v2
      data:
        JWT_PRIVATE_KEY: "{{ "{{ .private_key }}" }}"
        JWT_PUBLIC_KEY: "{{ "{{ .public_key }}" }}"
  data:
    - secretKey: private_key
      remoteRef:
        key: lons/{{ .Values.global.environment }}/jwt
        property: private_key
    - secretKey: public_key
      remoteRef:
        key: lons/{{ .Values.global.environment }}/jwt
        property: public_key
---
# Encryption secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "lons.secretName" . }}-encryption
  labels:
    {{- include "lons.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets-encryption
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ include "lons.fullname" . }}-aws-sm
    kind: ClusterSecretStore
  target:
    name: {{ include "lons.secretName" . }}-encryption
    template:
      engineVersion: v2
      data:
        ENCRYPTION_KEY: "{{ "{{ .key }}" }}"
  data:
    - secretKey: key
      remoteRef:
        key: lons/{{ .Values.global.environment }}/encryption
---
# Integration secrets (API keys, credentials)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "lons.secretName" . }}-integrations
  labels:
    {{- include "lons.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets-integrations
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ include "lons.fullname" . }}-aws-sm
    kind: ClusterSecretStore
  target:
    name: {{ include "lons.secretName" . }}-integrations
    template:
      engineVersion: v2
      data:
        MTN_MOMO_API_KEY: "{{ "{{ .mtn_momo_api_key }}" }}"
        MTN_MOMO_API_SECRET: "{{ "{{ .mtn_momo_api_secret }}" }}"
        AFRICAS_TALKING_API_KEY: "{{ "{{ .africas_talking_api_key }}" }}"
        AFRICAS_TALKING_USERNAME: "{{ "{{ .africas_talking_username }}" }}"
  data:
    - secretKey: mtn_momo_api_key
      remoteRef:
        key: lons/{{ .Values.global.environment }}/integrations
        property: mtn_momo_api_key
    - secretKey: mtn_momo_api_secret
      remoteRef:
        key: lons/{{ .Values.global.environment }}/integrations
        property: mtn_momo_api_secret
    - secretKey: africas_talking_api_key
      remoteRef:
        key: lons/{{ .Values.global.environment }}/integrations
        property: africas_talking_api_key
    - secretKey: africas_talking_username
      remoteRef:
        key: lons/{{ .Values.global.environment }}/integrations
        property: africas_talking_username
---
# Consolidated secret that merges all external secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "lons.secretName" . }}
  labels:
    {{- include "lons.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets-consolidated
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ include "lons.fullname" . }}-aws-sm
    kind: ClusterSecretStore
  target:
    name: {{ include "lons.secretName" . }}
    template:
      engineVersion: v2
      data:
        DATABASE_URL: "{{ "{{ .database_url }}" }}"
        REDIS_URL: "{{ "{{ .redis_url }}" }}"
        JWT_PRIVATE_KEY: "{{ "{{ .jwt_private_key }}" }}"
        JWT_PUBLIC_KEY: "{{ "{{ .jwt_public_key }}" }}"
        ENCRYPTION_KEY: "{{ "{{ .encryption_key }}" }}"
        MTN_MOMO_API_KEY: "{{ "{{ .mtn_momo_api_key }}" }}"
        MTN_MOMO_API_SECRET: "{{ "{{ .mtn_momo_api_secret }}" }}"
        AFRICAS_TALKING_API_KEY: "{{ "{{ .africas_talking_api_key }}" }}"
        AFRICAS_TALKING_USERNAME: "{{ "{{ .africas_talking_username }}" }}"
  data:
    - secretKey: database_url
      remoteRef:
        key: lons/{{ .Values.global.environment }}/database
    - secretKey: redis_url
      remoteRef:
        key: lons/{{ .Values.global.environment }}/redis
    - secretKey: jwt_private_key
      remoteRef:
        key: lons/{{ .Values.global.environment }}/jwt
        property: private_key
    - secretKey: jwt_public_key
      remoteRef:
        key: lons/{{ .Values.global.environment }}/jwt
        property: public_key
    - secretKey: encryption_key
      remoteRef:
        key: lons/{{ .Values.global.environment }}/encryption
    - secretKey: mtn_momo_api_key
      remoteRef:
        key: lons/{{ .Values.global.environment }}/integrations
        property: mtn_momo_api_key
    - secretKey: mtn_momo_api_secret
      remoteRef:
        key: lons/{{ .Values.global.environment }}/integrations
        property: mtn_momo_api_secret
    - secretKey: africas_talking_api_key
      remoteRef:
        key: lons/{{ .Values.global.environment }}/integrations
        property: africas_talking_api_key
    - secretKey: africas_talking_username
      remoteRef:
        key: lons/{{ .Values.global.environment }}/integrations
        property: africas_talking_username
{{- end }}
