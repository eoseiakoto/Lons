              kubernetes.io/name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Egress: platform-portal can reach graphql-server and DNS
{{- if .Values.platformPortal.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "lons.fullname" . }}-egress-platform
  labels:
    {{- include "lons.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: platform-portal
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Egress
  egress:
    # To graphql-server
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: graphql-server
