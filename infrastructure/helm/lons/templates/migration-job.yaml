apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "lons.fullname" . }}-db-migrate-{{ .Release.Revision }}
  labels:
    {{- include "lons.labels" . | nindent 4 }}
    app.kubernetes.io/component: db-migration
  annotations:
    "helm.sh/hook": pre-upgrade,pre-install
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        {{- include "lons.selectorLabels" (dict "context" . "component" "db-migration") | nindent 8 }}
        app.kubernetes.io/component: db-migration
    spec:
      restartPolicy: Never
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ .Values.postgresql.host }} {{ .Values.postgresql.port | default 5432 }}; do echo "Waiting for PostgreSQL..."; sleep 2; done']
      containers:
        - name: migrate
          image: {{ include "lons.image" (dict "imageValues" .Values.graphqlServer.image "global" .Values.global) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command: ["npx", "prisma", "migrate", "deploy", "--schema", "./packages/database/prisma/schema.prisma"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "lons.secretName" . }}
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
