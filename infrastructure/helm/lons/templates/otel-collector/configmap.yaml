{{- if .Values.tracing.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "lons.fullname" . }}-otel-collector
  labels:
    {{- include "lons.componentLabels" (dict "context" . "component" "otel-collector") | nindent 4 }}
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 512
        spike_limit_mib: 128

      batch:
        timeout: 5s
        send_batch_size: 512
        send_batch_max_size: 1024

      attributes:
        actions:
          - key: environment
            value: {{ .Values.global.environment }}
            action: insert
          - key: service.namespace
            value: lons
            action: insert
          - key: deployment.environment
            value: {{ .Values.global.environment }}
            action: insert

    exporters:
      logging:
        {{- if .Values.tracing.debug }}
        loglevel: debug
        {{- else }}
        loglevel: info
        {{- end }}

      awsxray:
        region: {{ .Values.tracing.aws.region }}

      otlp:
        endpoint: localhost:4317
        tls:
          insecure: true

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch, attributes]
          exporters: [awsxray, logging]

        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [logging]

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      pprof:
        endpoint: 127.0.0.1:1777
{{- end }}
