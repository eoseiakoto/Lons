apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lons.fullname" . }}-scheduler
  labels:
    {{- include "lons.componentLabels" (dict "context" . "component" "scheduler") | nindent 4 }}
spec:
  replicas: {{ .Values.scheduler.replicaCount }}
  selector:
    matchLabels:
      {{- include "lons.selectorLabels" (dict "context" . "component" "scheduler") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "lons.componentLabels" (dict "context" . "component" "scheduler") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.serviceMesh.enabled }}
        linkerd.io/inject: enabled
        config.linkerd.io/proxy-cpu-request: {{ .Values.serviceMesh.proxy.cpuRequest | default "25m" | quote }}
        config.linkerd.io/proxy-memory-request: {{ .Values.serviceMesh.proxy.memoryRequest | default "64Mi" | quote }}
        config.linkerd.io/proxy-cpu-limit: {{ .Values.serviceMesh.proxy.cpuLimit | default "250m" | quote }}
        config.linkerd.io/proxy-memory-limit: {{ .Values.serviceMesh.proxy.memoryLimit | default "256Mi" | quote }}
        {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ .Values.postgresql.host }} {{ .Values.postgresql.port | default 5432 }}; do echo "Waiting for PostgreSQL..."; sleep 2; done']
        - name: wait-for-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ .Values.redis.host }} {{ .Values.redis.port | default 6379 }}; do echo "Waiting for Redis..."; sleep 2; done']
      containers:
        - name: scheduler
          image: {{ include "lons.image" (dict "imageValues" .Values.scheduler.image "global" .Values.global) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.scheduler.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "lons.configmapName" . }}
            - secretRef:
                name: {{ include "lons.secretName" . }}
          livenessProbe:
            httpGet:
              path: {{ .Values.scheduler.healthCheck.path }}
              port: http
            initialDelaySeconds: {{ .Values.scheduler.healthCheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.scheduler.healthCheck.periodSeconds }}
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ .Values.scheduler.healthCheck.path }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.scheduler.resources | nindent 12 }}
      terminationGracePeriodSeconds: 30
      {{- if .Values.topologySpread.enabled }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: {{ .Values.topologySpread.whenUnsatisfiable | default "ScheduleAnyway" }}
          labelSelector:
            matchLabels:
              {{- include "lons.selectorLabels" (dict "context" . "component" "scheduler") | nindent 14 }}
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "lons.selectorLabels" (dict "context" . "component" "scheduler") | nindent 14 }}
      {{- end }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "lons.fullname" . }}-scheduler
  labels:
    {{- include "lons.labels" . | nindent 4 }}
    app.kubernetes.io/component: scheduler
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "lons.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: scheduler
