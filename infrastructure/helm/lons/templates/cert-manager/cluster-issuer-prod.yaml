{{- if .Values.certManager.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    {{- include "lons.labels" . | nindent 4 }}
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: {{ .Values.certManager.email }}
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
      - dns01:
          route53:
            region: {{ .Values.certManager.aws.region | default "eu-west-1" }}
            {{- if .Values.certManager.aws.hostedZoneID }}
            hostedZoneID: {{ .Values.certManager.aws.hostedZoneID }}
            {{- end }}
{{- end }}
