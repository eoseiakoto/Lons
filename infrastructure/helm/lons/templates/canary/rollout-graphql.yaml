{{- if .Values.canary.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "lons.fullname" . }}-graphql-server-canary
  labels:
    {{- include "lons.componentLabels" (dict "context" . "component" "graphql-server") | nindent 4 }}
spec:
  replicas: {{ .Values.graphqlServer.replicaCount }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      {{- include "lons.selectorLabels" (dict "context" . "component" "graphql-server") | nindent 6 }}
  strategy:
    canary:
      canaryService: {{ include "lons.fullname" . }}-graphql-server-canary
      stableService: {{ include "lons.fullname" . }}-graphql-server
      trafficRouting:
        nginx:
          stableIngress: {{ include "lons.fullname" . }}-ingress
      steps:
        - setWeight: 10
        - pause: { duration: 5m }
        - setWeight: 25
        - pause: { duration: 5m }
        - setWeight: 50
        - pause: { duration: 10m }
        - setWeight: 75
        - pause: { duration: 5m }
      analysis:
        templates:
          - templateName: {{ include "lons.fullname" . }}-success-rate
        startingStep: 1
        args:
          - name: service-name
            value: graphql-server
  template:
    metadata:
      labels:
        {{- include "lons.componentLabels" (dict "context" . "component" "graphql-server") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/../configmap.yaml") . | sha256sum }}
        {{- if .Values.serviceMesh.enabled }}
        linkerd.io/inject: enabled
        config.linkerd.io/proxy-cpu-request: {{ .Values.serviceMesh.proxy.cpuRequest | default "25m" | quote }}
        config.linkerd.io/proxy-memory-request: {{ .Values.serviceMesh.proxy.memoryRequest | default "64Mi" | quote }}
        config.linkerd.io/proxy-cpu-limit: {{ .Values.serviceMesh.proxy.cpuLimit | default "250m" | quote }}
        config.linkerd.io/proxy-memory-limit: {{ .Values.serviceMesh.proxy.memoryLimit | default "256Mi" | quote }}
        {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ .Values.postgresql.host }} {{ .Values.postgresql.port | default 5432 }}; do echo "Waiting for PostgreSQL..."; sleep 2; done']
        - name: wait-for-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ .Values.redis.host }} {{ .Values.redis.port | default 6379 }}; do echo "Waiting for Redis..."; sleep 2; done']
      containers:
        - name: graphql-server
          image: {{ include "lons.image" (dict "imageValues" .Values.graphqlServer.image "global" .Values.global) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.graphqlServer.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "lons.configmapName" . }}
            - secretRef:
                name: {{ include "lons.secretName" . }}
          livenessProbe:
            httpGet:
              path: {{ .Values.graphqlServer.healthCheck.path }}
              port: http
            initialDelaySeconds: {{ .Values.graphqlServer.healthCheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.graphqlServer.healthCheck.periodSeconds }}
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ .Values.graphqlServer.healthCheck.path }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.graphqlServer.resources | nindent 12 }}
      terminationGracePeriodSeconds: 30
      {{- if .Values.topologySpread.enabled }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: {{ .Values.topologySpread.whenUnsatisfiable | default "ScheduleAnyway" }}
          labelSelector:
            matchLabels:
              {{- include "lons.selectorLabels" (dict "context" . "component" "graphql-server") | nindent 14 }}
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "lons.selectorLabels" (dict "context" . "component" "graphql-server") | nindent 14 }}
      {{- end }}
{{- end }}
