## Production environment overrides
global:
  environment: production
  imagePullPolicy: IfNotPresent
  imageTag: ""  # Use per-service tags in production

graphqlServer:
  replicaCount: 3
  image:
    tag: "1.0.0"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 65
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi

restServer:
  replicaCount: 3
  image:
    tag: "1.0.0"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 65
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi

scheduler:
  replicaCount: 2
  image:
    tag: "1.0.0"
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

notificationWorker:
  replicaCount: 2
  image:
    tag: "1.0.0"
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

scoringService:
  replicaCount: 3
  image:
    tag: "1.0.0"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 60
  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 4000m
      memory: 4Gi

ingress:
  host: api.lons.io
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/rate-limit: "500"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
  tls:
    secretName: lons-production-tls

config:
  nodeEnv: production
  logLevel: info
  enableTracing: "false"

certManager:
  enabled: true
  issuer: letsencrypt-prod

adminPortal:
  replicaCount: 3
  image:
    tag: "1.0.0"
  host: admin.lons.io
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 15
    targetCPUUtilizationPercentage: 70

metrics:
  serviceMonitor:
    enabled: true
    interval: 15s
    scrapeTimeout: 5s

monitoring:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 15s
      scrapeTimeout: 5s
  alerts:
    enabled: true
  alertmanager:
    enabled: true
    webhookUrl: "https://monitoring.lons.io/webhook/alerts"
    criticalWebhookUrl: "https://monitoring.lons.io/webhook/critical"
    securityWebhookUrl: "https://monitoring.lons.io/webhook/security"
    dataWebhookUrl: "https://monitoring.lons.io/webhook/data"
    businessWebhookUrl: "https://monitoring.lons.io/webhook/business"
    slackWebhookUrl: ""  # Set via secrets
    pagerdutyIntegrationKey: ""  # Set via secrets
  dashboards:
    enabled: true

networkPolicy:
  enabled: true

serviceMesh:
  enabled: true
  proxy:
    cpuRequest: "25m"
    memoryRequest: "64Mi"
    cpuLimit: "250m"
    memoryLimit: "256Mi"
  authorization:
    enabled: true

externalSecrets:
  enabled: true

logging:
  enabled: true
  aws:
    region: eu-west-1
  retention:
    hot: 30
    warm: 90
    cold: 365

tracing:
  enabled: true
  collector:
    replicaCount: 2
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi

canary:
  enabled: true

resourceQuotas:
  enabled: true
  requests:
    cpu: "32"
    memory: "64Gi"
  limits:
    cpu: "64"
    memory: "128Gi"
  maxPods: "100"
  maxServices: "30"
  maxPVCs: "20"
  defaultLimits:
    cpu: "500m"
    memory: "512Mi"
  defaultRequests:
    cpu: "100m"
    memory: "128Mi"
  maxLimits:
    cpu: "4000m"
    memory: "4Gi"
  maxPodLimits:
    cpu: "8000m"
    memory: "8Gi"

topologySpread:
  enabled: true
  whenUnsatisfiable: ScheduleAnyway
