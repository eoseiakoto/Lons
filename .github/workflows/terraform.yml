name: Terraform

on:
  pull_request:
    paths:
      - 'infrastructure/terraform/**'
  push:
    branches: [main]
    paths:
      - 'infrastructure/terraform/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, staging, preprod, prod]
      action:
        description: 'Terraform action'
        required: true
        type: choice
        options: [plan, apply]

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: '1.6.0'
  AWS_REGION: 'eu-west-1'

jobs:
  terraform-validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        working-directory: infrastructure/terraform
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: infrastructure/terraform
        run: terraform validate

  terraform-plan:
    name: Plan Terraform - ${{ matrix.environment }}
    needs: terraform-validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, staging, preprod, prod]
      max-parallel: 2
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[format('AWS_ROLE_ARN_{0}', matrix.environment)] }}
          aws-region: ${{ env.AWS_REGION }}
          session-name: terraform-plan-${{ matrix.environment }}

      - name: Terraform Init
        working-directory: infrastructure/terraform
        run: |
          terraform init \
            -backend-config="bucket=lons-terraform-state-${{ secrets.AWS_ACCOUNT_ID }}" \
            -backend-config="key=${{ matrix.environment }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=lons-terraform-locks" \
            -upgrade

      - name: Terraform Plan
        id: plan
        working-directory: infrastructure/terraform
        run: |
          terraform plan \
            -var-file="environments/${{ matrix.environment }}.tfvars" \
            -out=tfplan \
            -no-color \
            -detailed-exitcode \
            -lock=false || [ $? -eq 2 ]

      - name: Save Plan Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: infrastructure/terraform/tfplan
          retention-days: 1

      - name: Generate Plan Summary
        id: plan-summary
        if: always()
        working-directory: infrastructure/terraform
        run: |
          if [ -f tfplan ]; then
            echo "plan_output<<EOF" >> $GITHUB_OUTPUT
            terraform show -no-color tfplan >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "plan_output=No changes" >> $GITHUB_OUTPUT
          fi

      - name: Comment PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const environment = '${{ matrix.environment }}';
            const summary = `${{ steps.plan-summary.outputs.plan_output }}`.substring(0, 65000);

            const comment = `## Terraform Plan - ${environment}

            \`\`\`terraform
            ${summary}
            \`\`\`

            **Environment:** ${environment}
            **Timestamp:** ${new Date().toISOString()}`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  terraform-apply:
    name: Apply Terraform - ${{ github.event.inputs.environment || 'multi-env' }}
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      github.event_name == 'workflow_dispatch'
    needs: terraform-plan
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    strategy:
      matrix:
        environment: ${{ github.event_name == 'workflow_dispatch' && fromJson(format('["{0}"]', github.event.inputs.environment)) || fromJson('["dev", "staging", "preprod", "prod"]') }}
      max-parallel: 1
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[format('AWS_ROLE_ARN_{0}', matrix.environment)] }}
          aws-region: ${{ env.AWS_REGION }}
          session-name: terraform-apply-${{ matrix.environment }}

      - name: Terraform Init
        working-directory: infrastructure/terraform
        run: |
          terraform init \
            -backend-config="bucket=lons-terraform-state-${{ secrets.AWS_ACCOUNT_ID }}" \
            -backend-config="key=${{ matrix.environment }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=lons-terraform-locks" \
            -upgrade

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: infrastructure/terraform/

      - name: Terraform Apply
        id: apply
        working-directory: infrastructure/terraform
        run: |
          if [ -f tfplan ]; then
            terraform apply -no-color -auto-approve tfplan
          else
            echo "No plan file found. Generating plan and applying..."
            terraform apply \
              -var-file="environments/${{ matrix.environment }}.tfvars" \
              -no-color \
              -auto-approve
          fi

      - name: Terraform Output
        id: output
        if: always()
        working-directory: infrastructure/terraform
        run: |
          echo "output<<EOF" >> $GITHUB_OUTPUT
          terraform output -no-color >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Publish Deployment Summary
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
            const environment = '${{ matrix.environment }}';
            const output = `${{ steps.output.outputs.output }}`.substring(0, 30000);

            const summary = `## ${status} Terraform Apply - ${environment}

            **Status:** ${{ job.status }}
            **Environment:** ${environment}
            **Timestamp:** ${new Date().toISOString()}

            ### Outputs
            \`\`\`
            ${output}
            \`\`\``;

            core.summary
              .addRaw(summary)
              .write();

  terraform-lock-check:
    name: Check Terraform Lock
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Check DynamoDB Lock Table
        run: |
          echo "If this job fails, check DynamoDB lock table for stale locks:"
          echo "aws dynamodb scan --table-name lons-terraform-locks --region ${{ env.AWS_REGION }}"
