name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lons
          POSTGRES_PASSWORD: lons
          POSTGRES_DB: lons
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter database exec prisma generate

      - name: Lint
        run: pnpm lint || true

      - name: Test
        run: pnpm test
        env:
          DATABASE_URL: postgresql://lons:lons@localhost:5432/lons
          REDIS_URL: redis://localhost:6379

      - name: Build
        run: pnpm build

      - name: Security Audit
        run: pnpm audit --audit-level=critical || true

  python-scoring:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          cd services/scoring-service
          pip install -r requirements.txt

      - name: Test
        run: |
          cd services/scoring-service
          python -m pytest tests/ -v
